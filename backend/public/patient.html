<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云医在线 - 患者端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; color: #333; }
        .app-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .logo { font-size: 18px; font-weight: bold; margin-bottom: 30px; display: flex; align-items: center; gap: 8px; }
        .user-info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 30px; }
        .user-info p { font-size: 14px; margin: 5px 0; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.2); }
        .nav-item.active { background: rgba(255,255,255,0.3); font-weight: bold; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h1 { font-size: 28px; color: #2c3e50; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:hover { background: #45a049; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        textarea { resize: vertical; height: 100px; }
        .consultation-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .consultation-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid #667eea; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-ongoing { background: #cfe2ff; color: #084298; }
        .status-completed { background: #d1e7dd; color: #0f5132; }
        .status-paid { background: #d1e7dd; color: #0f5132; }
        .status-unpaid { background: #f8d7da; color: #842029; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f5f5f5; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 500px; width: 90%; }
        .close { float: right; font-size: 28px; font-weight: bold; color: #aaa; cursor: pointer; }
        .close:hover { color: #000; }
        .alert { padding: 15px; margin-bottom: 15px; border-radius: 6px; }
        .alert-success { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .alert-error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">🏥 云医在线</div>
            <div class="user-info" id="userInfo">
                <p id="userName">加载中...</p>
                <p style="font-size: 12px; color: #ccc;">患者</p>
            </div>
            <div class="nav-item active" onclick="switchPage('home')">📊 首页</div>
            <div class="nav-item" onclick="switchPage('findDoctor')">👨‍⚕️ 选择医生</div>
            <div class="nav-item" onclick="switchPage('consultations')">📋 我的问诊</div>
            <div class="nav-item" onclick="switchPage('prescriptions')">💊 处方记录</div>
            <div class="nav-item" onclick="switchPage('orders')">💳 订单中心</div>
            <div class="nav-item" onclick="logout()">🚪 登出</div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 首页 -->
            <div class="page active" id="homePage">
                <div class="header">
                    <h1>欢迎回来</h1>
                </div>
                <div class="card">
                    <h2>统计概览</h2>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px;">
                        <div style="background: #e3f2fd; padding: 20px; border-radius: 8px; text-align: center;">
                            <div style="font-size: 24px; font-weight: bold;" id="statConsultations">0</div>
                            <div style="color: #666; font-size: 14px;">问诊次数</div>
                        </div>
                        <div style="background: #f3e5f5; padding: 20px; border-radius: 8px; text-align: center;">
                            <div style="font-size: 24px; font-weight: bold;" id="statCompleted">0</div>
                            <div style="color: #666; font-size: 14px;">已完成</div>
                        </div>
                        <div style="background: #e8f5e9; padding: 20px; border-radius: 8px; text-align: center;">
                            <div style="font-size: 24px; font-weight: bold;" id="statOngoing">0</div>
                            <div style="color: #666; font-size: 14px;">进行中</div>
                        </div>
                        <div style="background: #fff3e0; padding: 20px; border-radius: 8px; text-align: center;">
                            <div style="font-size: 24px; font-weight: bold;" id="statUnpaid">0</div>
                            <div style="color: #666; font-size: 14px;">待支付</div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h2>最近问诊</h2>
                    <div id="recentConsultations" style="margin-top: 15px;"></div>
                </div>
            </div>

            <!-- 选择医生 -->
            <div class="page" id="findDoctorPage">
                <div class="header">
                    <h1>选择医生</h1>
                </div>
                <div class="card">
                    <div class="form-group">
                        <label>科室选择</label>
                        <select id="departmentFilter" onchange="filterDoctors()">
                            <option value="">全部科室</option>
                        </select>
                    </div>
                </div>
                <div id="doctorsList" class="consultation-list"></div>
            </div>

            <!-- 我的问诊 -->
            <div class="page" id="consultationsPage">
                <div class="header">
                    <h1>我的问诊</h1>
                    <button class="btn btn-primary" onclick="switchPage('findDoctor')">发起问诊</button>
                </div>
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>问诊ID</th>
                                <th>医生</th>
                                <th>类型</th>
                                <th>费用</th>
                                <th>状态</th>
                                <th>支付状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="consultationsTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- 处方记录 -->
            <div class="page" id="prescriptionsPage">
                <div class="header">
                    <h1>处方记录</h1>
                </div>
                <div id="prescriptionsList" class="consultation-list"></div>
            </div>

            <!-- 订单中心 -->
            <div class="page" id="ordersPage">
                <div class="header">
                    <h1>订单中心</h1>
                </div>
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>订单ID</th>
                                <th>金额</th>
                                <th>支付方式</th>
                                <th>状态</th>
                                <th>时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- 新建问诊模态框 -->
            <div class="modal" id="consultationModal">
                <div class="modal-content">
                    <span class="close" onclick="closeModal('consultationModal')">&times;</span>
                    <h2>发起问诊</h2>
                    <form onsubmit="submitConsultation(event)">
                        <div class="form-group">
                            <label>问诊类型</label>
                            <select id="modalType" required>
                                <option value="expert">专家问诊</option>
                                <option value="quick">快速问诊</option>
                                <option value="prescription">开药问诊</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>症状描述</label>
                            <textarea id="modalComplaint" placeholder="请描述您的症状" required></textarea>
                        </div>
                        <button class="btn btn-primary" style="width: 100%;">提交</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let currentUser = null;
        let selectedDoctor = null;

        // 初始化
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                window.location.href = '/patient-login.html';
                return;
            }
            currentUser = user;
            document.getElementById('userName').textContent = user.name + ' (' + user.username + ')';
            initApp();
        });

        function initApp() {
            loadStats();
            loadRecentConsultations();
            loadDepartments();
            loadConsultations();
            loadPrescriptions();
            loadOrders();
        }

        function switchPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/consultations?patient_id=${currentUser.id}`);
                const consultations = await res.json();
                const completed = consultations.filter(c => c.status === 'completed').length;
                const ongoing = consultations.filter(c => c.status === 'ongoing').length;
                const unpaid = consultations.filter(c => c.payment_status === 'unpaid').length;

                document.getElementById('statConsultations').textContent = consultations.length;
                document.getElementById('statCompleted').textContent = completed;
                document.getElementById('statOngoing').textContent = ongoing;
                document.getElementById('statUnpaid').textContent = unpaid;
            } catch (err) {
                console.error('加载统计失败:', err);
            }
        }

        async function loadRecentConsultations() {
            try {
                const res = await fetch(`${API_URL}/consultations?patient_id=${currentUser.id}`);
                const consultations = await res.json();
                const recent = consultations.slice(0, 5);
                const html = recent.map(c => `
                    <div class="consultation-card">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
                            <div><strong>医生: ${c.doctor_name || '未分配'}</strong></div>
                            <span class="status-badge status-${c.status}">${c.status === 'pending' ? '待接诊' : c.status === 'ongoing' ? '进行中' : '已完成'}</span>
                        </div>
                        <p style="color: #666; font-size: 14px;">类型: ${c.type}</p>
                        <p style="color: #666; font-size: 14px;">费用: ¥${c.fee}</p>
                        <p style="color: #999; font-size: 12px;">${new Date(c.created_at).toLocaleDateString()}</p>
                    </div>
                `).join('');
                document.getElementById('recentConsultations').innerHTML = html || '<p style="color: #999;">暂无问诊记录</p>';
            } catch (err) {
                console.error('加载最近问诊失败:', err);
            }
        }

        async function loadDepartments() {
            try {
                const res = await fetch(`${API_URL}/departments`);
                const departments = await res.json();
                const filter = document.getElementById('departmentFilter');
                departments.forEach(dept => {
                    const option = document.createElement('option');
                    option.value = dept.id;
                    option.textContent = dept.name;
                    filter.appendChild(option);
                });
                loadDoctors();
            } catch (err) {
                console.error('加载科室失败:', err);
            }
        }

        async function loadDoctors() {
            try {
                const res = await fetch(`${API_URL}/doctors`);
                const doctors = await res.json();
                const html = doctors.map(doctor => `
                    <div class="consultation-card" onclick="selectDoctor(${doctor.id}, '${doctor.name}')">
                        <h3>${doctor.name}</h3>
                        <p style="color: #666;">专科: ${doctor.specialty || '综合'}</p>
                        <p style="color: #999; font-size: 12px;">医院: ${doctor.hospital || '云医医院'}</p>
                        <button class="btn btn-primary" style="width: 100%; margin-top: 10px;">选择医生</button>
                    </div>
                `).join('');
                document.getElementById('doctorsList').innerHTML = html;
            } catch (err) {
                console.error('加载医生失败:', err);
            }
        }

        function filterDoctors() {
            loadDoctors(); // 简化起见，这里就直接重新加载全部
        }

        function selectDoctor(doctorId, doctorName) {
            selectedDoctor = { id: doctorId, name: doctorName };
            document.getElementById('consultationModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        async function submitConsultation(e) {
            e.preventDefault();
            try {
                const data = {
                    patient_id: currentUser.id,
                    doctor_id: selectedDoctor.id,
                    department_id: 1,
                    type: document.getElementById('modalType').value,
                    complaint: document.getElementById('modalComplaint').value,
                    fee: 99.99
                };
                const res = await fetch(`${API_URL}/consultations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert('问诊已发起！');
                    closeModal('consultationModal');
                    loadConsultations();
                }
            } catch (err) {
                alert('发起问诊失败: ' + err.message);
            }
        }

        async function loadConsultations() {
            try {
                const res = await fetch(`${API_URL}/consultations?patient_id=${currentUser.id}`);
                const consultations = await res.json();
                const html = consultations.map(c => `
                    <tr>
                        <td>${c.id}</td>
                        <td>${c.doctor_name || '未分配'}</td>
                        <td>${c.type}</td>
                        <td>¥${c.fee}</td>
                        <td><span class="status-badge status-${c.status}">${c.status}</span></td>
                        <td><span class="status-badge status-${c.payment_status}">${c.payment_status === 'paid' ? '已支付' : '未支付'}</span></td>
                        <td><button class="btn btn-primary" onclick="payConsultation(${c.id})">支付</button></td>
                    </tr>
                `).join('');
                document.getElementById('consultationsTable').innerHTML = html || '<tr><td colspan="7" style="text-align: center; color: #999;">暂无问诊记录</td></tr>';
            } catch (err) {
                console.error('加载问诊失败:', err);
            }
        }

        async function loadPrescriptions() {
            try {
                const res = await fetch(`${API_URL}/prescriptions`);
                const prescriptions = await res.json();
                const html = prescriptions.map(p => `
                    <div class="consultation-card">
                        <h3>处方ID: ${p.id}</h3>
                        <p><strong>内容:</strong> ${p.content}</p>
                        <p><strong>状态:</strong> <span class="status-badge status-${p.status}">${p.status}</span></p>
                        <p style="color: #999; font-size: 12px;">${new Date(p.created_at).toLocaleDateString()}</p>
                    </div>
                `).join('');
                document.getElementById('prescriptionsList').innerHTML = html || '<p style="color: #999;">暂无处方记录</p>';
            } catch (err) {
                console.error('加载处方失败:', err);
            }
        }

        async function loadOrders() {
            try {
                const res = await fetch(`${API_URL}/orders?patient_id=${currentUser.id}`);
                const orders = await res.json();
                const html = orders.map(o => `
                    <tr>
                        <td>${o.id}</td>
                        <td>¥${o.amount}</td>
                        <td>${o.payment_method}</td>
                        <td><span class="status-badge status-${o.status}">${o.status === 'paid' ? '已支付' : '待支付'}</span></td>
                        <td>${new Date(o.created_at).toLocaleDateString()}</td>
                        <td>${o.status === 'pending' ? '<button class="btn btn-primary" onclick="payOrder(' + o.id + ')">支付</button>' : '-'}</td>
                    </tr>
                `).join('');
                document.getElementById('ordersTable').innerHTML = html || '<tr><td colspan="6" style="text-align: center; color: #999;">暂无订单</td></tr>';
            } catch (err) {
                console.error('加载订单失败:', err);
            }
        }

        function payConsultation(consultationId) {
            alert('跳转到支付页面 (演示)');
            // 实际应用中会跳转到支付页面
        }

        function payOrder(orderId) {
            alert('订单支付成功 (演示)');
            // 实际应用中会调用支付API
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '/patient-login.html';
        }
    </script>
</body>
</html>
